apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubelogreader
  namespace: {{.Release.Namespace}}
  labels:
    app: k8s_01
    host: kubelogreader
spec:
  selector:
    matchLabels:
      name: kubelogreader
  template:
    metadata:
      labels:
        name: kubelogreader
    spec:
      serviceAccount: kubelogreader
      serviceAccountName: kubelogreader
      volumes:
        - name: keystore
          secret:
            secretName: {{.Values.keystore.secretName}}
            optional: true
        - configMap:
            name: config
          name: config
        - hostPath:
            path: {{.Values.statestore.hostMountPath}}
            type: DirectoryOrCreate
          name: statestore
        - hostPath:
            path: /var/log/containers
            type: Directory
          name: host-var-log-containers
        - hostPath:
            path: /var/log/pods
            type: Directory
          name: host-var-log-pods
      containers:
        - name: kubelogreader
          image: "{{.Values.image.repository}}/{{.Values.image.path}}:{{.Chart.Version}}"
          imagePullPolicy: {{.Values.image.pullPolicy}}
          securityContext:
            privileged: true
          volumeMounts:
            - name: keystore
              mountPath: /opt/teragrep/k8s_01/secret
            - name: config
              mountPath: /opt/teragrep/k8s_01/etc
            - name: statestore
              mountPath: /opt/teragrep/k8s_01/var
            - name: host-var-log-containers
              mountPath: /var/log/containers
            - name: host-var-log-pods
              mountPath: /var/log/pods
          command: ["/usr/bin/bash"]
          args: ["-c", "cd /opt/teragrep/k8s_01 || exit 1; exec /opt/teragrep/k8s_01/bin/java --add-opens java.base/java.nio=ALL-UNNAMED --add-opens java.base/sun.nio.ch=ALL-UNNAMED --enable-native-access=ALL-UNNAMED -Dlog4j2.configurationFile=file:/opt/teragrep/k8s_01/etc/log4j2.xml -jar lib/k8s_01.jar"]
